blueprint:
  name: "Tapo S200D - Dial Brightness Control"
  description: >
    Adjust light brightness by rotating the Tapo S200D dial.
    Clockwise increases brightness, counter-clockwise decreases.
    The sensitivity multiplier controls how much each rotation changes the brightness.
  domain: automation
  input:
    dial_entity:
      name: Dial Event Entity
      description: The Tapo S200D dial event entity
      selector:
        entity:
          domain: event
    light_target:
      name: Light
      description: The light or light group to control
      selector:
        entity:
          domain: light
    sensitivity:
      name: Sensitivity
      description: >
        Multiplier for dial rotation. Lower = finer control, higher = bigger steps.
        0.4 is a good default for smooth dimming.
      default: 0.4
      selector:
        number:
          min: 0.1
          max: 2.0
          step: 0.1

variables:
  sensitivity: !input sensitivity

triggers:
  - platform: state
    entity_id: !input dial_entity

actions:
  - action: light.turn_on
    target:
      entity_id: !input light_target
    data:
      brightness_step_pct: >
        {{ (trigger.to_state.attributes.degrees | float(0) * sensitivity) | int }}

mode: single
