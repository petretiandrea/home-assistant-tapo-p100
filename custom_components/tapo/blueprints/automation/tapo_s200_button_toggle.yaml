blueprint:
  name: "Tapo S200B/S200D - Button Toggle Light"
  description: >
    Toggle a light or light group on/off with a Tapo S200B or S200D button press.
    Uses actual light state — if the light is on, turns it off, and vice versa.
  domain: automation
  input:
    button_entity:
      name: Button Event Entity
      description: The Tapo S200B or S200D button event entity
      selector:
        entity:
          domain: event
    light_target:
      name: Light
      description: The light or light group to toggle
      selector:
        entity:
          domain: light
    brightness:
      name: Turn-on Brightness
      description: Brightness percentage when turning on
      default: 100
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"

triggers:
  - platform: state
    entity_id: !input button_entity

actions:
  - choose:
      - conditions:
          - condition: state
            entity_id: !input light_target
            state: "on"
        sequence:
          - action: light.turn_off
            target:
              entity_id: !input light_target
    default:
      - action: light.turn_on
        target:
          entity_id: !input light_target
        data:
          brightness_pct: !input brightness
  - delay:
      seconds: 2

mode: single
