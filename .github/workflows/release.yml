name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  tests:
    uses: ./.github/workflows/tests.yml

  validate:
    uses: ./.github/workflows/validate.yml

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [lint, tests, validate]
    environment: release

    concurrency:
      group: release
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GIT_GITHUB_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup Node 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Semantic Release (Dry Run)
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 23.0.2
          branches: |
            [ 'main', {name: 'dev', channel: 'dev', prerelease: true} ]
          extra_plugins: |
            @semantic-release/commit-analyzer@11.1.0
            @semantic-release/release-notes-generator@12.1.0
            @semantic-release/git@10.0.1
            @semantic-release/github@9.2.6
          dry_run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_GITHUB_TOKEN || github.token }}

      - name: Update versioned files
        if: steps.semantic.outputs.new_release_published == 'true'
        run: python3 script/sync_version.py "${{ steps.semantic.outputs.new_release_version }}"

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 23.0.2
          branches: |
            [ 'main', {name: 'dev', channel: 'dev', prerelease: true} ]
          extra_plugins: |
            @semantic-release/commit-analyzer@11.1.0
            @semantic-release/release-notes-generator@12.1.0
            @semantic-release/git@10.0.1
            @semantic-release/github@9.2.6
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_GITHUB_TOKEN || github.token }}
